<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ワゴン原価計算</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f0e8;
    --wood: #8B5E3C;
    --wood-dark: #5c3d20;
    --wood-light: #c49a6c;
    --ink: #1a1008;
    --accent: #d4461a;
    --muted: #9a8070;
    --panel: #ede8df;
    --border: #c8b89a;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 24px 16px 48px;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, var(--border) 39px, var(--border) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(200,184,154,0.3) 39px, rgba(200,184,154,0.3) 40px);
    background-size: 40px 40px;
  }

  .container {
    max-width: 560px;
    margin: 0 auto;
  }

  header {
    background: var(--wood-dark);
    color: #f5f0e8;
    padding: 20px 24px 16px;
    border-radius: 4px 4px 0 0;
    position: relative;
    overflow: hidden;
  }
  header::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0; bottom: 0;
    background: repeating-linear-gradient(
      90deg,
      transparent,
      transparent 8px,
      rgba(255,255,255,0.03) 8px,
      rgba(255,255,255,0.03) 9px
    );
  }
  header h1 {
    font-size: 1.4rem;
    font-weight: 900;
    letter-spacing: 0.05em;
    position: relative;
  }
  header p {
    font-size: 0.75rem;
    color: var(--wood-light);
    margin-top: 4px;
    font-family: 'Space Mono', monospace;
    position: relative;
  }

  .card {
    background: var(--panel);
    border: 1.5px solid var(--border);
    border-top: none;
    padding: 20px;
  }
  .card + .card {
    border-top: 1.5px solid var(--border);
    margin-top: 0;
  }

  .section-label {
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: var(--wood);
    text-transform: uppercase;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section-label::after {
    content: '';
    flex: 1;
    height: 1px;
    background: var(--border);
  }

  .material-list { display: flex; flex-direction: column; gap: 8px; }

  .material-row {
    display: grid;
    grid-template-columns: 1fr 100px 28px;
    gap: 6px;
    align-items: center;
    animation: slideIn 0.2s ease;
  }
  @keyframes slideIn {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }

  input[type="text"], input[type="number"] {
    width: 100%;
    padding: 8px 10px;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    background: #faf8f4;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.9rem;
    color: var(--ink);
    transition: border-color 0.15s;
    -webkit-appearance: none;
  }
  input:focus {
    outline: none;
    border-color: var(--wood);
    background: #fff;
  }
  input[type="number"] { font-family: 'Space Mono', monospace; }

  .btn-remove {
    width: 28px; height: 28px;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    background: #faf8f4;
    color: var(--muted);
    font-size: 1rem;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
    flex-shrink: 0;
  }
  .btn-remove:hover { border-color: var(--accent); color: var(--accent); background: #fff; }

  .btn-add {
    margin-top: 10px;
    width: 100%;
    padding: 8px;
    border: 1.5px dashed var(--border);
    border-radius: 3px;
    background: transparent;
    color: var(--muted);
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.15s;
  }
  .btn-add:hover { border-color: var(--wood); color: var(--wood); background: rgba(139,94,60,0.05); }

  .row-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

  .field-group { display: flex; flex-direction: column; gap: 4px; }
  .field-label {
    font-size: 0.75rem;
    color: var(--muted);
    font-weight: 700;
    letter-spacing: 0.05em;
  }

  .btn-calc {
    width: 100%;
    padding: 14px;
    background: var(--wood-dark);
    color: #f5f0e8;
    border: none;
    border-radius: 0 0 4px 4px;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    letter-spacing: 0.1em;
    cursor: pointer;
    transition: background 0.15s;
    position: relative;
    overflow: hidden;
  }
  .btn-calc:hover { background: var(--wood); }
  .btn-calc:active { transform: scale(0.99); }

  /* Result */
  .result {
    margin-top: 16px;
    border: 2px solid var(--wood-dark);
    border-radius: 4px;
    overflow: hidden;
    display: none;
    animation: popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes popIn {
    from { opacity: 0; transform: scale(0.96); }
    to { opacity: 1; transform: scale(1); }
  }
  .result.show { display: block; }

  .result-header {
    background: var(--wood-dark);
    color: #f5f0e8;
    padding: 10px 16px;
    font-size: 0.7rem;
    font-family: 'Space Mono', monospace;
    letter-spacing: 0.1em;
  }

  .result-body { background: #faf8f4; padding: 16px; }

  .result-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    padding: 6px 0;
    border-bottom: 1px solid var(--border);
    font-size: 0.88rem;
  }
  .result-row:last-child { border-bottom: none; }
  .result-row .label { color: var(--muted); }
  .result-row .value {
    font-family: 'Space Mono', monospace;
    font-weight: 700;
    color: var(--ink);
  }

  .result-price {
    margin-top: 12px;
    padding: 14px;
    background: var(--wood-dark);
    border-radius: 3px;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }
  .result-price .label { color: var(--wood-light); font-size: 0.8rem; font-weight: 700; }
  .result-price .value {
    font-family: 'Space Mono', monospace;
    font-size: 1.5rem;
    font-weight: 700;
    color: #fff;
  }

  .profit-bar-wrap {
    margin-top: 10px;
    background: var(--border);
    border-radius: 2px;
    height: 6px;
    overflow: hidden;
  }
  .profit-bar {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
    transition: width 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  .profit-hint {
    font-size: 0.72rem;
    color: var(--muted);
    margin-top: 4px;
    font-family: 'Space Mono', monospace;
  }

  .mode-toggle {
    display: flex;
    gap: 0;
    margin-bottom: 14px;
    border: 1.5px solid var(--border);
    border-radius: 3px;
    overflow: hidden;
  }
  .mode-btn {
    flex: 1;
    padding: 8px;
    background: #faf8f4;
    border: none;
    font-family: 'Noto Sans JP', sans-serif;
    font-size: 0.8rem;
    color: var(--muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .mode-btn.active {
    background: var(--wood-dark);
    color: #f5f0e8;
    font-weight: 700;
  }
  .mode-btn + .mode-btn { border-left: 1.5px solid var(--border); }

  #mode-profit, #mode-reverse { }
  .mode-section { display: none; }
  .mode-section.active { display: block; }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>🪵 ワゴン原価計算</h1>
    <p>COST CALCULATOR v1.0</p>
  </header>

  <!-- 材料費 -->
  <div class="card">
    <div class="section-label">材料費</div>
    <div class="material-list" id="material-list">
      <div class="material-row">
        <input type="text" placeholder="材料名（例：木材）" value="木材">
        <input type="number" placeholder="金額" value="2500" min="0">
        <button class="btn-remove" onclick="removeRow(this)">×</button>
      </div>
      <div class="material-row">
        <input type="text" placeholder="材料名" value="キャスター">
        <input type="number" placeholder="金額" value="800" min="0">
        <button class="btn-remove" onclick="removeRow(this)">×</button>
      </div>
      <div class="material-row">
        <input type="text" placeholder="材料名" value="塗料・ネジ等">
        <input type="number" placeholder="金額" value="300" min="0">
        <button class="btn-remove" onclick="removeRow(this)">×</button>
      </div>
    </div>
    <button class="btn-add" onclick="addRow()">＋ 材料を追加</button>
  </div>

  <!-- 工賃・その他 -->
  <div class="card">
    <div class="section-label">工賃・その他</div>
    <div class="row-2col">
      <div class="field-group">
        <span class="field-label">制作時間（時間）</span>
        <input type="number" id="hours" value="5" min="0" step="0.5">
      </div>
      <div class="field-group">
        <span class="field-label">時給（円）</span>
        <input type="number" id="hourly" value="1000" min="0">
      </div>
    </div>
    <div class="field-group" style="margin-top:10px">
      <span class="field-label">その他経費（梱包・送料など）</span>
      <input type="number" id="other" value="200" min="0">
    </div>
  </div>

  <!-- 計算モード -->
  <div class="card">
    <div class="section-label">計算モード</div>
    <div class="mode-toggle">
      <button class="mode-btn active" id="btn-profit" onclick="switchMode('profit')">利益率から価格を出す</button>
      <button class="mode-btn" id="btn-reverse" onclick="switchMode('reverse')">販売価格から利益率を出す</button>
    </div>

    <div class="mode-section active" id="mode-profit">
      <div class="field-group">
        <span class="field-label">希望利益率（%）</span>
        <input type="number" id="margin" value="30" min="0" max="99">
      </div>
    </div>

    <div class="mode-section" id="mode-reverse">
      <div class="field-group">
        <span class="field-label">販売予定価格（円）</span>
        <input type="number" id="sell-price" value="8000" min="0">
      </div>
    </div>
  </div>

  <button class="btn-calc" onclick="calculate()">計算する →</button>

  <!-- 結果 -->
  <div class="result" id="result">
    <div class="result-header">── RESULT ──────────────────</div>
    <div class="result-body">
      <div class="result-row">
        <span class="label">材料費合計</span>
        <span class="value" id="r-material">-</span>
      </div>
      <div class="result-row">
        <span class="label">工賃</span>
        <span class="value" id="r-labor">-</span>
      </div>
      <div class="result-row">
        <span class="label">その他経費</span>
        <span class="value" id="r-other">-</span>
      </div>
      <div class="result-row" style="font-weight:700">
        <span class="label">原価合計</span>
        <span class="value" id="r-cost">-</span>
      </div>

      <div class="result-price">
        <span class="label" id="r-price-label">推奨販売価格</span>
        <span class="value" id="r-price">-</span>
      </div>

      <div class="profit-bar-wrap">
        <div class="profit-bar" id="profit-bar" style="width:0%"></div>
      </div>
      <div class="profit-hint" id="profit-hint"></div>
    </div>
  </div>

</div>

<script>
  let mode = 'profit';

  function switchMode(m) {
    mode = m;
    document.getElementById('mode-profit').classList.toggle('active', m === 'profit');
    document.getElementById('mode-reverse').classList.toggle('active', m === 'reverse');
    document.getElementById('btn-profit').classList.toggle('active', m === 'profit');
    document.getElementById('btn-reverse').classList.toggle('active', m === 'reverse');
    document.getElementById('result').classList.remove('show');
  }

  function addRow() {
    const list = document.getElementById('material-list');
    const row = document.createElement('div');
    row.className = 'material-row';
    row.innerHTML = `
      <input type="text" placeholder="材料名">
      <input type="number" placeholder="金額" min="0">
      <button class="btn-remove" onclick="removeRow(this)">×</button>
    `;
    list.appendChild(row);
    row.querySelector('input').focus();
  }

  function removeRow(btn) {
    const rows = document.querySelectorAll('.material-row');
    if (rows.length <= 1) return;
    btn.closest('.material-row').remove();
  }

  function fmt(n) { return n.toLocaleString('ja-JP') + '円'; }

  function calculate() {
    // 材料費
    let materialTotal = 0;
    document.querySelectorAll('.material-row').forEach(row => {
      const val = parseFloat(row.querySelectorAll('input')[1].value) || 0;
      materialTotal += val;
    });

    const hours = parseFloat(document.getElementById('hours').value) || 0;
    const hourly = parseFloat(document.getElementById('hourly').value) || 0;
    const other = parseFloat(document.getElementById('other').value) || 0;
    const labor = hours * hourly;
    const cost = materialTotal + labor + other;

    document.getElementById('r-material').textContent = fmt(materialTotal);
    document.getElementById('r-labor').textContent = fmt(labor);
    document.getElementById('r-other').textContent = fmt(other);
    document.getElementById('r-cost').textContent = fmt(cost);

    if (mode === 'profit') {
      const margin = parseFloat(document.getElementById('margin').value) || 0;
      const price = Math.ceil(cost / (1 - margin / 100));
      const profit = price - cost;
      const actualMargin = margin;

      document.getElementById('r-price-label').textContent = '推奨販売価格';
      document.getElementById('r-price').textContent = fmt(price);
      document.getElementById('profit-hint').textContent =
        `利益 ${fmt(profit)}　利益率 ${actualMargin.toFixed(1)}%`;
      setTimeout(() => {
        document.getElementById('profit-bar').style.width = Math.min(margin, 80) + '%';
      }, 50);
    } else {
      const sellPrice = parseFloat(document.getElementById('sell-price').value) || 0;
      const profit = sellPrice - cost;
      const margin = cost > 0 ? (profit / sellPrice * 100) : 0;

      document.getElementById('r-price-label').textContent = '販売価格';
      document.getElementById('r-price').textContent = fmt(sellPrice);

      const hint = profit >= 0
        ? `利益 ${fmt(profit)}　利益率 ${margin.toFixed(1)}%`
        : `⚠️ 赤字！ ${fmt(Math.abs(profit))} 足りない`;
      document.getElementById('profit-hint').textContent = hint;
      setTimeout(() => {
        document.getElementById('profit-bar').style.width = Math.max(0, Math.min(margin, 80)) + '%';
      }, 50);
    }

    const result = document.getElementById('result');
    result.classList.remove('show');
    void result.offsetWidth;
    result.classList.add('show');
  }
</script>
</body>
</html>
